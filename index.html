<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Currency Converter</title>
        <meta name="description" content="A simple currency converter built with JavaScript">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h2>Currency Converter</h2>
            <form>
                <div class="amount">
                    <p>Enter Amount</p>
                    <input id="amount" value="100" type="text" />  <!-- added id="amount" -->
                </div>
                <div class="dropdown">
                    <div class="from">
                        <p>From</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/US/shiny/64.png" alt="From flag">
                            <select name="from"></select>
                        </div>
                    </div>
                    <div class="to">
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/shiny/64.png" alt="To flag">
                            <select name="to"></select>
                        </div>
                    </div>
                </div>
                <div class="msg"></div>  <!-- cleared hardcoded text, JS will populate -->
                <button id="btn">Get Exchange Rate</button>  <!-- added id="btn" -->
            </form>
        </div>

        <script src="codes.js"></script>
        <script src="app.js"></script>
    </body>
</html>
